version: 2
sources:
  - name: raw
    schema: gz_raw_data #Path of the table in BQ
    description: greenwez raw data source
    tables:
      - name: sales
        identifier: raw_gz_sales #What is the exact name of the table in  BQ
        description: sales of greewneez / we have one row per product_id found in each order_id
        columns:
          - name: "(orders_id || '-' || pdt_id)"
            description: primary key of the table
            tests:
              - unique
              - not_null
      - name: product
        identifier: raw_gz_product
        description: purchase_price by products_id
        columns:
          - name: products_id
            description: primary key of the table
            tests:
              - unique
              - not_null
      - name: ship
        identifier: raw_gz_ship
        description: shipping and logistical costs by orders_id
        columns:
          - name: orders_id
            description: primary key of the table
            tests:
              - unique
              - not_null
      - name: adwords
        identifier: raw_gz_adwords
        description: campaigns run over this platform / we have one row per campaign_key+date_date
        columns:
          - name: "(campaign_key || '-' || date_date)"
            description: primary key of the table
            tests:
              - unique
              - not_null
      - name: bing
        identifier: raw_gz_bing
        description: campaigns run over this platform / we have one row per campaign_key+date_date
        columns:
          - name: "(campaign_key || '-' || date_date)"
            description: primary key of the table
            tests:
              - unique
              - not_null
      - name: criteo
        identifier: raw_gz_criteo
        description: campaigns run over this platform / we have one row per campaign_key+date_date
        columns:
          - name: "(campaign_key || '-' || date_date)"
            description: primary key of the table
            tests:
              - unique
              - not_null
      - name: facebook
        identifier: raw_gz_facebook
        description: campaigns run over this platform / we have one row per campaign_key+date_date
        columns:
          - name: "(campaign_key || '-' || date_date)"
            description: primary key of the table
            tests:
              - unique
              - not_null